data:
  raw_dir: ${oc.env:DATA_DIR, ./data/raw}
  processed_dir: ${oc.env:DATA_DIR, ./data/processed}
  start_date: "2018-01-01"
  end_date: "2023-12-31"
  coin_list:
    - "BTC_USD"
    - "ETH_USD"
    - "BNB_USD"
    - "ADA_USD"
    - "SOL_USD"

window:
  L: 60
  H: 20

embedding:
  vae:
    latent_dim_tech: 16
    latent_dim_mkt: 16
    d_model: 64
    nhead: 4
    num_layers: 2
    dropout: 0.1
    beta: 0.001
  train:
    learning_rate: 1.0e-4
    batch_size: 64
    epochs: 50
    save_every: 10
    n_samples: 2000
    checkpoint_dir: "checkpoints/vae"

experts:
  list:
    - a2c
    - ppo
    - ddpg
    - sac
    - td3
  hyperparameters:
    learning_rate: 3.0e-4
    batch_size: 64
    n_steps: 2048
    gamma: 0.99
    tau: 0.005

llm:
  model_name: "openai/Google/Gemma4-E4B"
  api_base: "http://saca-api.inside.sahab.ir:3100/v1"
  api_key: "sk-4IWPsIu46oKs13De2pqADQ"
  temperature: 0.7
  max_tokens: 1024

retrieval:
  K: 5
  similarity_metric: "cosine"
  vector_db: "faiss"

uncertainty:
  lambda: 0.1

backtest:
  initial_capital: 100000.0
  transaction_cost: 0.001
  rebalance_freq: "monthly"

logging:
  level: "INFO"
  file: "logs/pipeline.log"

seed: 42
