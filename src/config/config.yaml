data:
  raw_dir: ${oc.env:DATA_DIR, ./data/raw}
  processed_dir: ${oc.env:DATA_DIR, ./data/processed}
  start_date: "2018-01-01"
  end_date: "2023-12-31"
  coin_list:
    - "BTC-USD"
    - "ETH-USD"
    - "BNB-USD"
    - "ADA-USD"
    - "SOL-USD"

window:
  L: 60
  H: 20

embedding:
  input_dim: 128
  latent_dim: 16
  vae_hidden_dims: [64, 32]

experts:
  list:
    - a2c
    - ppo
    - ddpg
    - sac
    - td3
  hyperparameters:
    learning_rate: 3.0e-4
    batch_size: 64
    n_steps: 2048
    gamma: 0.99
    tau: 0.005

llm:
  model_name: "gpt-4"
  api_base: null
  api_key: ${oc.env:LLM_API_KEY, ""}
  temperature: 0.7
  max_tokens: 1024

retrieval:
  K: 5
  similarity_metric: "cosine"
  vector_db: "faiss"

uncertainty:
  lambda: 0.1

backtest:
  initial_capital: 100000.0
  transaction_cost: 0.001
  rebalance_freq: "monthly"

logging:
  level: "INFO"
  file: "logs/pipeline.log"

seed: 42
